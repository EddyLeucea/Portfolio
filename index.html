<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="gradient-bg.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-overlay"></div>

    <nav class="glass-nav">
        <div class="nav-content">
            <span class="logo">Eddy.</span>
            <button class="menu-toggle" aria-label="Toggle Menu">
                <span class="menu-divider"></span>
                <span class="menu-label">MENU</span>
                <div class="hamburger-lines">
                    <span class="line"></span>
                    <span class="line"></span>
                </div>
            </button>
        </div>
    </nav>

    <!-- Fullscreen Menu Overlay -->
    <nav class="fullscreen-menu">
        <ul class="fullscreen-nav-links">
            <li><a href="./index.html" class="active">Home</a></li>
            <li><a href="./about.html">About Me</a></li>
            <li><a href="./projects.html">Projects</a></li>
            <li><a href="./cv.html">CV</a></li>
            <li><a href="./contact.html">Contact Me</a></li>
        </ul>
    </nav>

    <main>
        <!-- Cinematic Hero -->
        <section class="hero cinematic-hero">
            <div class="hero-content">
                <span class="hero-tagline">WELCOME TO MY PORTFOLIO</span>
                <h1 class="hero-title">Hi, my<br>name is <span style="color: var(--accent-secondary); font-weight: 700;">Eduard.</span></h1>
                <p class="hero-description">Student at Thomas More — building modern digital experiences.</p>
                <div class="hero-actions">
                    <a href="./projects.html" class="btn btn-primary">View My Work</a>
                    <a href="./about.html" class="btn btn-secondary">More About Me</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="glass-footer">
        <p>&copy; 2026 Eduard Leucea. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const fullscreenMenu = document.querySelector('.fullscreen-menu');

        if (menuToggle && fullscreenMenu) {
            menuToggle.addEventListener('click', () => {
                menuToggle.classList.toggle('active');
                fullscreenMenu.classList.toggle('active');
                document.body.classList.toggle('menu-open');
            });
        }
    </script>
    <!-- Custom Background Canvas and Collision Logic -->
    <script src="./background.js"></script>
</body>

</html>
